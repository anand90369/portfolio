<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect
      // Converts path-based URLs to hash-based for HashRouter compatibility
      var path = window.location.pathname;
      var base = '/portfolio/';
      if (path !== base && path !== base.slice(0, -1)) {
        var route = path.replace(base, '/');
        window.location.replace(base + '#' + route + window.location.search);
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
